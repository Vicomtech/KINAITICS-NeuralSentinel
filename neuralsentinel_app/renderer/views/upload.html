<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Content Security Policy to restrict script and style sources -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;">
  <title>Upload Files - NeuralSentinel Desktop</title>
  <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
  <div class="wrapper">
    <!-- Header with logo and title -->
    <header class="index-header">
      <div class="logo-container">
        <img src="../assets/icono_Vicomtech.ico" alt="NeuralSentinel Logo" class="ns-logo">
        <h1 class="ns-title">NeuralSentinel Desktop</h1>
      </div>
    </header>

    <!-- Main content for file upload -->
    <main class="upload-main">
      <div class="upload-container">
        <!-- Upload Dataset Section -->
        <section class="upload-section upload-dataset">
          <div class="info-tooltip">
            <span class="info-icon">?</span>
            <div class="tooltip-text">Accepted formats: .npy, .npz</div>
          </div>
          <h1>Upload Dataset</h1>
          <p class="upload-description">Select and upload your dataset.</p>
          <button id="uploadDatasetBtn" class="btn">Upload dataset</button>
        </section>

        <!-- Upload Trained Model Section -->
        <section class="upload-section upload-model">
          <div class="info-tooltip">
            <span class="info-icon">?</span>
            <div class="tooltip-text">Accepted formats: .h5</div>
          </div>
          <h1>Upload Trained Model</h1>
          <p class="upload-description">Select and upload your trained model.</p>
          <button id="uploadModelBtn" class="btn">Upload model</button>
        </section>
      </div>
    </main>

    <!-- Footer section with copyright -->
    <footer class="index-footer">
      <p>© <span id="current-year"></span> NeuralSentinel. All rights reserved.</p>
    </footer>

    <!-- Back to Dashboard Button -->
    <div style="position: fixed; bottom: 20px; left: 20px;">
      <button id="backToDashboardBtn" class="btn">Back to Dashboard</button>
    </div>
  </div>

  <!-- Vicomtech Logo in the corner -->
  <img src="../assets/logo_Vicomtech.png" alt="Vicomtech Logo" class="corner-logo">

  <!-- External script for the upload controller -->
  <script src="../controllers/upload.js"></script>

  <!-- Set the current year dynamically -->
  <script>
    document.getElementById('current-year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
