<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NeuralSentinel Desktop</title>
  <base href="./">
  <!-- Content Security Policy to restrict script and style sources -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
  <div class="wrapper">
    <!-- Header with logo and title -->
    <header class="index-header">
      <div class="logo-container">
        <img src="../assets/icono_Vicomtech.ico" alt="NeuralSentinel Logo" class="ns-logo">
        <h1 class="ns-title">NeuralSentinel Desktop</h1>
      </div>
    </header>

    <!-- Main description and action buttons -->
    <main class="index-main">
      <h2>Welcome to NeuralSentinel Desktop!</h2>
      <p class="index-description">
        NeuralSentinel helps you manage and evaluate your datasets and models.
        Quickly upload files, calculate metrics, and visualize them in a user-friendly dashboard.
      </p>
      <div class="index-buttons">
        <a href="upload.html"    class="btn">Upload files</a>
        <a href="dashboard.html" class="btn">View dashboard</a>
      </div>
    </main>

    <!-- Footer section with copyright -->
    <footer class="index-footer">
      <p>© <span id="current-year"></span> NeuralSentinel. All rights reserved.</p>
    </footer>
  </div>

  <!-- Vicomtech Logo in the corner -->
  <img src="../assets/logo_Vicomtech.png" alt="Vicomtech Logo" class="corner-logo">

  <!-- Set the current year dynamically -->
  <script>
    document.getElementById('current-year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
