<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Content Security Policy without unsafe-inline for scripts -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;">
  <title>Login - NeuralSentinel Desktop</title>
  <link rel="stylesheet" href="../styles/styles.css">
  <!-- External login controller script -->
  <script src="../controllers/login.js" defer></script>
</head>
<body>
  <div class="wrapper">
    <!-- Header with logo and title -->
    <header class="index-header">
      <div class="logo-container">
        <img src="../assets/icono_Vicomtech.ico" alt="NeuralSentinel Logo" class="ns-logo">
        <h1 class="ns-title">NeuralSentinel Desktop</h1>
      </div>
    </header>

    <!-- Main login form content -->
    <main class="login-main">
      <div class="login-container">
        <h2>Login</h2>
        <form id="loginForm">
          <input type="text" id="username" placeholder="Username" required>
          <input type="password" id="password" placeholder="Password" required>
          <button type="submit">Login</button>
        </form>
        <div id="errorMsg" class="error"></div>
      </div>
    </main>

    <!-- Footer section with copyright -->
    <footer class="index-footer">
      <p>© <span id="current-year"></span> NeuralSentinel. All rights reserved.</p>
    </footer>
  </div>

  <!-- Vicomtech Logo in the corner -->
  <img src="../assets/logo_Vicomtech.png" alt="Vicomtech Logo" class="corner-logo">
</body>
</html>
